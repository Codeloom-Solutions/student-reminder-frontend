<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | SAQR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="auth-page">
    <a href="index.html" class="logo">
      <img class="logo-mark" src="../assets/images/logo.webp" alt="SAQR logo">
      <div>
        <span class="logo-text">SAQR</span>
        <span class="logo-sub">UNIVERSITY SCHOOL PORTAL</span>
      </div>
    </a>

    <div class="auth-card register-variant">
      <h1>Register</h1>
      <p class="auth-subtitle">Join SAQR for better study management</p>

      <form id="register-form" novalidate>
        <div class="form-split-grid">
          
          <div class="form-inputs-column">
            <div class="field">
              <label for="full-name">Full name</label>
              <div class="input-wrap no-icon">
                <input type="text" id="full-name" name="fullName" autocomplete="name" required>
              </div>
              <p class="field-error"></p>
            </div>

            <div class="field">
              <label for="student-number">Student Number</label>
              <div class="input-wrap no-icon">
                <input type="text" id="student-number" name="studentNumber" required>
              </div>
              <p class="field-error"></p>
            </div>

            <div class="field">
              <label for="register-email">Email</label>
              <div class="input-wrap no-icon">
                <input type="email" id="register-email" name="email" autocomplete="email" required>
              </div>
              <p class="field-error"></p>
            </div>

            <div class="field">
              <label for="phone">Phone</label>
              <div class="input-wrap no-icon">
                <input type="tel" id="phone" name="phone" autocomplete="tel" required>
              </div>
              <p class="field-error"></p>
            </div>

            <div class="field">
              <label for="register-password">Password</label>
              <div class="input-wrap">
                <input type="password" id="register-password" name="password" autocomplete="new-password" required>
                <button type="button" class="toggle-eye" aria-label="Show password">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <p class="field-error"></p>
            </div>

            <div class="field">
              <label for="confirm-password">Confirm Password</label>
              <div class="input-wrap">
                <input type="password" id="confirm-password" name="confirmPassword" autocomplete="new-password" required>
                <button type="button" class="toggle-eye" aria-label="Show password">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <p class="field-error"></p>
            </div>
          </div>

        </div>

        <div class="auth-actions">
          <a href="index.html" class="btn btn-secondary">Back</a>
          <button type="submit" class="btn btn-primary">Register</button>
        </div>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Login.</a></p>
    </div>
  </main>

  <footer class="site-footer">
    <a href="index.html" class="logo footer-top logo--on-dark">
      <img src="../assets/images/logo.webp" alt="SAQR Logo" class="logo-mark"> 
      <div>
        <span class="logo-text">SAQR</span>
        <span class="logo-sub">UNIVERSITY SCHOOL PORTAL</span>
      </div>
    </a>

    <div class="footer-grid">
      <div class="footer-col">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="login.html">Students</a></li>
          <li><a href="login.html">Lecturers</a></li>
          <li><a href="login.html">Admin</a></li>
        </ul>
      </div>

      

      <div class="footer-col">
        <h4><a href="contact.html">Contact Us</a></h4>
        <div class="contact-item">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#c9d2e3" stroke-width="2"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11 11 0 0 0 3.4.55 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .55 3.4 1 1 0 0 1-.25 1Z"/></svg>
          <span>+27 123 456 789</span>
        </div>
        <div class="contact-item">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#c9d2e3" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          <span>SAQR.com</span>
        </div>
        <div class="contact-item">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#c9d2e3" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          <span>info@saqr.com</span>
        </div>
      </div>

      <div class="footer-col">
        <h4>Follow us</h4>

          <a href="#" aria-label="X / Twitter"><svg viewBox="0 0 24 24"><path d="M3 3l8 9.5L3.5 21H6l5.5-6.6L16 21h5l-8.3-9.9L20 3h-2.5l-5 6L8 3H3Z"/></svg></a>
          <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24"><path d="M8 3h8a5 5 0 0 1 5 5v8a5 5 0 0 1-5 5H8a5 5 0 0 1-5-5V8a5 5 0 0 1 5-5Zm0 2a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3V8a3 3 0 0 0-3-3H8Zm4 3.5a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Zm0 2a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5ZM17 6.3a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/></svg></a>
          <a href="#" aria-label="LinkedIn"><svg viewBox="0 0 24 24"><path d="M4.5 3.8a2 2 0 1 0 0 4 2 2 0 0 0 0-4ZM3 9.5h3V21H3V9.5Zm6 0h2.9v1.6h.04c.4-.76 1.4-1.6 2.96-1.6 3.16 0 3.74 2.08 3.74 4.78V21h-3v-5.2c0-1.24-.02-2.84-1.74-2.84-1.74 0-2.0 1.36-2.0 2.76V21H9V9.5Z"/></svg></a>
        </div>
      </div>
    </div>

    <hr class="footer-divider">
    <p class="copyright">Copyright@SAQR Since 2026</p>
  </footer>

</body>
</html>
