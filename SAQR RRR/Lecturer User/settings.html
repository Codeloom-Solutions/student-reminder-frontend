<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Settings - SAQR Portal</title>
    <link rel="stylesheet" href="lecturer-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="top-navbar">
        <div class="logo-area"><img src="../assets/images/logo.webp" alt="SAQR Logo"></div>
        <div class="top-nav-controls">
            <button class="nav-icon"><i class="fa-regular fa-bell"></i></button>
            <div class="profile-trigger"><i class="fa-regular fa-circle-user fa-xl"></i> <i class="fa-solid fa-angle-down"></i></div>
        </div>
    </header>

    <div class="main-container">
        <nav class="sidebar">
            <div class="user-tag">
                <i class="fa-solid fa-user-large"></i>
                <div class="user-tag-info"><h4>user:</h4><p>Lecturer</p></div>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="dashboard.html"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
                <li class="sidebar-item"><a href="create-task.html"><i class="fa-solid fa-pen-to-square"></i> <span>Create Task</span></a></li>
                <li class="sidebar-item"><a href="manage-task.html"><i class="fa-solid fa-list-check"></i> <span>Manage Task</span></a></li>
                <li class="sidebar-item"><a href="notifications.html"><i class="fa-solid fa-bell"></i> <span>Notifications</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="sidebar-item active"><a href="profile.html"><i class="fa-solid fa-user-gear"></i> <span>Profile</span></a></li>
                <div class="sidebar-item"><a href="../Public Pages/index.html"><i class="fa-solid fa-door-open"></i> <span>Log out</span></a></li>
            </div>
        </nav>

        <main class="workspace">
            <h1 class="page-title">Settings</h1>

            <div class="profile-card-base" style="max-width: 700px;">
                <div class="config-header-row">
                    <h2>LECTURER SETTINGS</h2>
                    <h2>System Configuration</h2>
                </div>

                <div class="config-form-interior">
                    <div class="config-row-split">
                        <label>System name</label>
                        <input type="text" class="profile-control-input" name="sys-name">
                    </div>
                    <div class="config-row-split" style="margin-top: 5px;">
                        <label>Default time zone</label>
                        <input type="text" class="profile-control-input" name="sys-timezone">
                    </div>
                    <div class="config-row-split" style="margin-top: 5px;">
                        <label>Lecturer</label>
                        <input type="text" class="profile-control-input" name="sys-lecturer-id">
                    </div>

                    <div class="config-section-divider">Notifications</div>

                    <div class="toggle-setting-card">
                        <span>Assignment alerts</span>
                        <label class="switch"><input type="checkbox" name="set-assign"><span class="slider"></span></label>
                    </div>
                    <div class="toggle-setting-card">
                        <span>Email</span>
                        <label class="switch"><input type="checkbox" name="set-email"><span class="slider"></span></label>
                    </div>
                    <div class="toggle-setting-card">
                        <span>SMS</span>
                        <label class="switch"><input type="checkbox" name="set-sms"><span class="slider"></span></label>
                    </div>

                    <div class="config-section-divider">Security</div>

                    <div class="toggle-setting-card">
                        <span>Two factor security</span>
                        <label class="switch"><input type="checkbox" name="set-2fa"><span class="slider"></span></label>
                    </div>
                    <div class="toggle-setting-card">
                        <span>Notifications</span>
                        <label class="switch"><input type="checkbox" name="set-sec-notif"><span class="slider"></span></label>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/core-services.js"></script>
    <script src="../assets/js/page-actions.js"></script>
</body>
</html>
