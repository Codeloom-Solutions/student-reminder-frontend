<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - SAQR Portal</title>
    <link rel="stylesheet" href="student-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="top-navbar">
        <div class="logo-area"><img src="../assets/images/logo.webp" alt="SAQR Logo"></div>
        <div class="top-nav-controls">
            <button class="nav-icon"><i class="fa-regular fa-bell"></i></button>
            <div class="profile-trigger"><i class="fa-regular fa-circle-user fa-xl"></i> <i class="fa-solid fa-angle-down"></i></div>
        </div>
    </header>

    <div class="main-container">
        <nav class="sidebar">
            <div class="user-tag">
                <i class="fa-solid fa-user-large"></i>
                <div class="user-tag-info"><h4>user:</h4><p>Student</p></div>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="dashboard.html"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
                <li class="sidebar-item"><a href="tasks.html"><i class="fa-solid fa-briefcase"></i> <span>Tasks</span></a></li>
                <li class="sidebar-item"><a href="courses.html"><i class="fa-solid fa-book-open"></i> <span>Subjects</span></a></li>
                <li class="sidebar-item"><a href="notifications.html"><i class="fa-solid fa-bell"></i> <span>Notifications</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="sidebar-item active"><a href="profile.html"><i class="fa-solid fa-gear"></i> <span>Profile</span></a></li>
                <div class="sidebar-item"><a href="../Public-Pages/index.html"><i class="fa-solid fa-door-open"></i> <span>Logout</span></a></li>
            </div>
        </nav>

        <main class="workspace">
            <h1 class="page-title">Settings</h1>

            <div class="card-wrapper" style="max-width: 650px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <h2 style="font-weight: bold; font-size: 1.4rem;">STUDENT SETTINGS</h2>
                    <h2 style="font-weight: bold; font-size: 1.4rem;">Change Password</h2>
                </div>

                <form class="form-body" style="background-color: #90a4be;">
                    <div class="input-block form-row-split">
                        <label style="align-self: center;">Email:</label>
                        <div class="field-container" style="gap: 10px; width: 100%;">
                            <input type="email" class="form-control" name="verify-email" value="">
                            <button type="button" class="otp-btn">Send OTP <span style="color: green; margin-left: 2px;">✓</span></button>
                        </div>
                    </div>

                    <div class="input-block form-row-split">
                        <label style="align-self: center;">OTP:</label>
                        <div class="field-container" style="width: 100%;">
                            <input type="text" class="form-control" name="otp-code" value="" style="padding-right: 40px;">
                            <span style="position: absolute; right: 15px; color: green;">✓</span>
                        </div>
                    </div>

                    <div class="input-block form-row-split">
                        <label style="align-self: center;">New Password:</label>
                        <input type="password" class="form-control" name="new-password" value="">
                    </div>

                    <div class="input-block form-row-split">
                        <label style="align-self: center;">Confirm Password:</label>
                        <input type="password" class="form-control" name="confirm-new-password" value="">
                    </div>

                    <button type="submit" class="action-btn" style="background-color: #ffffff; color: #000000; border: 1px solid #777; margin-top: 15px; align-self: center; padding: 10px 40px;">Change Password</button>
                </form>
            </div>
        </main>
    </div>

    <script src="../assets/js/core-services.js"></script>
    <script src="../assets/js/page-actions.js"></script>
</body>
</html>
